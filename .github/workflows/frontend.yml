name: Deploy Darista Frontend

on:
  push:
    branches: [main]
    paths:
      - 'marque-blanche-ecommerce-main/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: marque-blanche-ecommerce-main/package-lock.json

      - name: Pull Vercel Environment
        working-directory: marque-blanche-ecommerce-main
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build with Vercel
        working-directory: marque-blanche-ecommerce-main
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest build --prod --token=$VERCEL_TOKEN

      - name: Deploy Prebuilt to Vercel
        working-directory: marque-blanche-ecommerce-main
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN
